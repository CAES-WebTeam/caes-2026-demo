<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>CAES Homepage — Composed</title>
<link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700;900&family=Archivo+Narrow:wght@500;600;700&display=swap" rel="stylesheet" />

<!-- Shared tokens -->
<link rel="stylesheet" href="sections/_tokens.css" />

<!-- Per-block CSS — same files used by the standalone block pages -->
<link rel="stylesheet" href="sections/uga-global-bar/uga-global-bar.css" />
<link rel="stylesheet" href="sections/top-nav/top-nav.css" />
<link rel="stylesheet" href="sections/hero/hero.css" />
<link rel="stylesheet" href="sections/berry-decor/berry-decor.css" />
<link rel="stylesheet" href="sections/announcement/announcement.css" />
<link rel="stylesheet" href="sections/impact-mosaic/impact-mosaic.css" />
<link rel="stylesheet" href="sections/student-life/student-life.css" />
<link rel="stylesheet" href="sections/news/news.css" />
<link rel="stylesheet" href="sections/read-all-about/read-all-about.css" />
<link rel="stylesheet" href="sections/caes-footer/caes-footer.css" />
<link rel="stylesheet" href="sections/uga-footer/uga-footer.css" />
</head>
<body>

<a class="sr-only" href="#main">Skip to main content</a>
<div id="root"></div>

<!-- React -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Shared helpers (IMG, LogoMark, Brand) -->
<script type="text/babel" src="sections/_shared.jsx"></script>

<!-- Block components — order matches the page composition -->
<script type="text/babel" src="sections/uga-global-bar/uga-global-bar.jsx"></script>
<script type="text/babel" src="sections/top-nav/top-nav.jsx"></script>
<script type="text/babel" src="sections/hero/hero.jsx"></script>
<script type="text/babel" src="sections/berry-decor/berry-decor.jsx"></script>
<script type="text/babel" src="sections/announcement/announcement.jsx"></script>
<script type="text/babel" src="sections/impact-mosaic/impact-mosaic.jsx"></script>
<script type="text/babel" src="sections/student-life/student-life.jsx"></script>
<script type="text/babel" src="sections/news/news.jsx"></script>
<script type="text/babel" src="sections/read-all-about/read-all-about.jsx"></script>
<script type="text/babel" src="sections/caes-footer/caes-footer.jsx"></script>
<script type="text/babel" src="sections/uga-footer/uga-footer.jsx"></script>

<!-- Compose -->
<script type="text/babel">
  function HomePage() {
    return (
      <>
        <header className="site-header" role="banner">
          <UGAGlobalBar />
          <TopNav />
        </header>
        <main id="main">
          <BerryDecor />
          <Hero image="uploads/home1.jpg" onMenu={() => console.log("menu drawer wires up later")} />
          <Announcement />
          <ImpactMosaic />
          <StudentLife />
          <LatestNews />
          <ReadAllAbout />
        </main>
        <CaesFooter />
        <UgaFooter />
      </>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<HomePage />);
</script>
</body>
</html>
